name: olsr-lab

topology:
  nodes:
    r1:
      kind: linux
      image: quay.io/frrouting/frr:8.5.1
      network-mode: host
      cap-add:
        - NET_ADMIN
        - NET_RAW
      binds:
        - ../../../bin/olsrd:/usr/local/bin/olsrd-go
        - ../config/r1/olsrd.yaml:/etc/olsrd/olsrd.yaml
        - ../config/daemons:/etc/frr/daemons
      cmd: /bin/sh -c "/usr/lib/frr/zebra -d && /usr/lib/frr/pimd -d && sleep 1 && /usr/local/bin/olsrd-go --config /etc/olsrd/olsrd.yaml"

    r2:
      kind: linux
      image: quay.io/frrouting/frr:8.5.1
      network-mode: host
      cap-add:
        - NET_ADMIN
        - NET_RAW
      binds:
        - ../../../bin/olsrd:/usr/local/bin/olsrd-go
        - ../config/r2/olsrd.yaml:/etc/olsrd/olsrd.yaml
        - ../config/daemons:/etc/frr/daemons
      cmd: /bin/sh -c "/usr/lib/frr/zebra -d && /usr/lib/frr/pimd -d && sleep 1 && /usr/local/bin/olsrd-go --config /etc/olsrd/olsrd.yaml"

    r3:
      kind: linux
      image: quay.io/frrouting/frr:8.5.1
      network-mode: host
      cap-add:
        - NET_ADMIN
        - NET_RAW
      binds:
        - ../../../bin/olsrd:/usr/local/bin/olsrd-go
        - ../config/r3/olsrd.yaml:/etc/olsrd/olsrd.yaml
        - ../config/daemons:/etc/frr/daemons
      cmd: /bin/sh -c "/usr/lib/frr/zebra -d && /usr/lib/frr/pimd -d && sleep 1 && /usr/local/bin/olsrd-go --config /etc/olsrd/olsrd.yaml"

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r2:eth2", "r3:eth1"]
