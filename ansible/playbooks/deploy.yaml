---
- name: Provision Core Routing Support and Exporters
  hosts: all
  become: true
  gather_facts: true
  roles:
    - frr
    - node_exporter

- name: Rolling Upgrade OLSR Routing Daemon
  hosts: all
  become: true
  gather_facts: true
  serial: 1
  roles:
    - olsrd

- name: Configure Prometheus Exporter Scrapers
  hosts: all
  become: true
  gather_facts: true
  roles:
    - prometheus
