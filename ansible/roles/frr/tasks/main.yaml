---
- name: Install FRRouting package
  ansible.builtin.package:
    name: frr
    state: present

- name: Configure Zebra daemon startup
  ansible.builtin.replace:
    path: /etc/frr/daemons
    regexp: '^zebra=no'
    replace: 'zebra=yes'

- name: Configure PIM (multicast) daemon startup
  ansible.builtin.replace:
    path: /etc/frr/daemons
    regexp: '^pimd=no'
    replace: 'pimd=yes'

- name: Start and enable FRRouting service
  ansible.builtin.systemd:
    name: frr
    state: restarted
    enabled: true
